<!-- Inventory View -->
<div class="fade-in">
    <div class="header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div class="search-bar" style="position: relative; width: 300px;">
            <i class="fa-solid fa-search text-muted" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%);"></i>
            <input type="text" id="search-inventory" placeholder="Buscar producto o código..." style="width: 100%; padding: 12px 15px 12px 40px; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none;">
        </div>
        <button class="btn btn-success hover-scale" style="background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600;" onclick="openNewProductModal()">
            <i class="fa-solid fa-plus"></i> Añadir Producto
        </button>
    </div>

    <div class="glass-panel" style="overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 2px solid var(--glass-border); color: var(--text-muted); text-align: left;">
                    <th style="padding: 15px;">Producto</th>
                    <th style="padding: 15px;">Precio Venta</th>
                    <th style="padding: 15px; text-align: right;">Acciones</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body">
                <tr><td colspan="6" style="text-align: center; padding: 20px; color: var(--text-muted);">Cargando inventario...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Overlay para Inventario -->
<div id="product-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;">
    <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 30px; transform: translateY(-20px); transition: transform 0.3s ease; position: relative;">
        <button onclick="closeProductModal()" style="position: absolute; right: 20px; top: 20px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem;"><i class="fa-solid fa-times"></i></button>
        <h3 id="product-modal-title" style="margin-bottom: 20px; font-size: 1.5rem;">Añadir Producto</h3>
        
        <form id="product-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="hidden" id="product-id">
            
            <div>
                <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem;">Nombre del Producto *</label>
                <input type="text" id="product-name" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none;">
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem;">Precio de Venta *</label>
                <input type="number" step="0.01" id="product-price" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none;">
            </div>
            
            <button type="submit" id="product-save-btn" class="btn btn-primary" style="margin-top: 10px; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Guardar Producto</button>
        </form>
    </div>
</div>

<script>
    function openNewProductModal() {
        document.getElementById('product-modal-title').innerText = 'Añadir Producto';
        document.getElementById('product-form').reset();
        document.getElementById('product-id').value = '';
        
        const modal = document.getElementById('product-modal');
        modal.style.display = 'flex';
        setTimeout(() => {
            modal.style.opacity = '1';
            modal.children[0].style.transform = 'translateY(0)';
        }, 10);
    }

    function closeProductModal() {
        const modal = document.getElementById('product-modal');
        modal.style.opacity = '0';
        modal.children[0].style.transform = 'translateY(-20px)';
        setTimeout(() => {
            modal.style.display = 'none';
        }, 300);
    }

    window.openNewProductModal = openNewProductModal;
    window.closeProductModal = closeProductModal;
    
    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('product-id').value;
        const data = {
            name: document.getElementById('product-name').value,
            price: parseFloat(document.getElementById('product-price').value)
        };
        
        const method = id ? 'PUT' : 'POST';
        const url = id ? '/api/products/' + id : '/api/products';
        
        const btn = document.getElementById('product-save-btn');
        btn.innerText = 'Guardando...';
        btn.disabled = true;
        
        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                closeProductModal();
                loadViewData('inventory'); 
            } else {
                alert('Error al guardar el producto');
            }
        } catch(err) {
            console.error(err);
            alert('Error de conexión');
        } finally {
            btn.innerText = 'Guardar Producto';
            btn.disabled = false;
        }
    });

    window.editProduct = function(id, name, price) {
        document.getElementById('product-modal-title').innerText = 'Editar Producto';
        document.getElementById('product-id').value = id;
        document.getElementById('product-name').value = name;
        document.getElementById('product-price').value = price;
        
        const modal = document.getElementById('product-modal');
        modal.style.display = 'flex';
        setTimeout(() => {
            modal.style.opacity = '1';
            modal.children[0].style.transform = 'translateY(0)';
        }, 10);
    }
</script>
