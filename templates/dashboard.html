<div class="dashboard-container fade-in">
    <!-- Welcome Section -->
    <div class="welcome-card glass-panel">
        <div class="welcome-text">
            <h2 id="greeting-text">Buenos días</h2>
            <p id="current-date">Cargando fecha...</p>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <!-- 1. Membresías Activas -->
        <div class="stat-card glass-panel stagger-1 hover-scale" style="cursor: pointer;" onclick="document.querySelector('[data-target=\'clients\']').click(); setTimeout(() => { document.getElementById('filter-clients').value = 'active'; window.renderClientsTable(); }, 200);">
            <div class="stat-icon bg-success-glow">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="stat-details">
                <h3>Membresías Activas</h3>
                <p class="stat-value" id="stat-active-memberships">...</p>
            </div>
        </div>

        <!-- 2. Por Vencer -->
        <div class="stat-card glass-panel stagger-2 hover-scale" style="cursor: pointer;" onclick="document.querySelector('[data-target=\'clients\']').click(); setTimeout(() => { document.getElementById('filter-clients').value = 'active'; window.renderClientsTable(); }, 200);">
            <div class="stat-icon bg-warning-glow">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div class="stat-details">
                <h3>Por Vencer (5 días)</h3>
                <p class="stat-value" id="stat-expiring-memberships">...</p>
            </div>
        </div>

        <!-- 3. Ingresos del Día -->
        <div class="stat-card glass-panel stagger-3">
            <div class="stat-icon bg-primary-glow">
                <i class="fa-solid fa-money-bill-wave"></i>
            </div>
            <div class="stat-details">
                <h3>Ingresos del Día</h3>
                <p class="stat-value" id="stat-today-income">$0</p>
            </div>
        </div>

        <!-- 4. Vencidas -->
        <div class="stat-card glass-panel stagger-4 hover-scale" style="cursor: pointer;" onclick="document.querySelector('[data-target=\'clients\']').click(); setTimeout(() => { document.getElementById('filter-clients').value = 'expired'; window.renderClientsTable(); }, 200);">
            <div class="stat-icon bg-danger-glow">
                <i class="fa-solid fa-user-xmark"></i>
            </div>
            <div class="stat-details">
                <h3>Membresías Vencidas</h3>
                <p class="stat-value" id="stat-expired-memberships">...</p>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Establecer Saludo
        const hour = new Date().getHours();
        let greeting = 'Buenas noches';
        if (hour < 12) greeting = 'Buenos días';
        else if (hour < 18) greeting = 'Buenas tardes';
        document.getElementById('greeting-text').innerText = greeting;

        // Establecer fecha
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-MX', options);

        fetch('/api/dashboard/stats')
            .then(response => response.json())
            .then(data => {
                document.getElementById('stat-active-memberships').innerText = data.active_memberships;
                document.getElementById('stat-expiring-memberships').innerText = data.expiring_memberships;
                document.getElementById('stat-today-income').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }).format(data.today_income);
                document.getElementById('stat-expired-memberships').innerText = data.expired_memberships;
            })
            .catch(error => console.error('Error fetching stats:', error));
    })();
</script>
